services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - php
    volumes:
      - drupal_code:/var/www/html:ro
      - drupal_public_files:/var/www/html/web/sites/default/files
      # if you use private files, add another volume and point Drupal private path there
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - "80"

  php:
    build:
      context: .
      dockerfile: docker/Dockerfile.php
    environment:
      APP_ENV: prod
      DB_HOST: db
      DB_NAME: drupal
      DB_USER: drupal
      DB_PASSWORD: ${DB_PASSWORD}
      HASH_SALT: ${HASH_SALT}
      # Optional if you're behind proxy and want to force https detection safely
      TRUSTED_HOSTS: '^example\.com$'
    volumes:
      - drupal_code:/var/www/html
      - drupal_public_files:/var/www/html/web/sites/default/files
    depends_on:
      - db

  db:
    image: mariadb:11.4
    environment:
      MARIADB_DATABASE: drupal
      MARIADB_USER: drupal
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql

  # Optional: run Drupal cron via drush every 15 minutes
  cron:
    image: ghcr.io/drush-ops/drush:12
    depends_on:
      - php
    volumes:
      - drupal_code:/var/www/html
      - drupal_public_files:/var/www/html/web/sites/default/files
    entrypoint: ["/bin/sh","-lc"]
    command: ["while true; do (cd /var/www/html && drush -r /var/www/html/web cron -v) || true; sleep 900; done"]

volumes:
  drupal_code:
  drupal_public_files:
  db_data:
