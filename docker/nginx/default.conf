server {
  listen 80;
  server_name _;

  root /var/www/html/web;
  index index.php;

  client_max_body_size 64m;

  # Drupal front controller
  location / {
    try_files $uri /index.php?$query_string;
  }

  # Static files caching (adjust as you like)
  location ~* \.(?:css|js|jpg|jpeg|gif|png|svg|ico|webp|woff2?)$ {
    try_files $uri @drupal;
    expires 7d;
    access_log off;
  }
  location @drupal {
    rewrite ^ /index.php?$query_string;
  }

  # PHP handling
  location ~ \.php$ {
    try_files $uri =404;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    fastcgi_param HTTPS $http_x_forwarded_proto;
    fastcgi_pass php:9000;
  }

  # Protect sensitive files
  location ~* \.(?:engine|inc|install|make|module|profile|po|sh|sql|theme|twig|yml|yaml|lock|json|md)$ {
    return 404;
  }
  location ~* ^/(?:composer\.(?:json|lock)|vendor/|\.git/|web/sites/[^/]+/(?:private|settings\.php)) {
    return 404;
  }
}
